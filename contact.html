<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="contact-style.css">
</head>
<body>
    <div class="container">
        <div class="contact-wrapper">
            <h1>Contact Us</h1>
            <p class="subtitle">We'd love to hear from you. Get in touch with us today!</p>

            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required placeholder="What is this about?">
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" required placeholder="Enter your message here..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>

            <div class="contact-info">
                <h2>Other Ways to Reach Us</h2>
                <div class="info-cards">
                    <div class="info-card">
                        <h3>📍 Address</h3>
                        <p>123 Main Street<br>City, State 12345</p>
                    </div>
                    <div class="info-card">
                        <h3>📞 Phone</h3>
                        <p>+1 (555) 123-4567</p>
                    </div>
                    <div class="info-card">
                        <h3>✉️ Email</h3>
                        <p>info@example.com</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
